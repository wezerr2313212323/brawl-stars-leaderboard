<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars — Лидеры</title>
    <meta charset="UTF-8">
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #c73a52;
        }
        .player {
            background: #0f3460;
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
        }
        .top1 { background: #ffd700; color: black; }
        .top2 { background: #c0c0c0; color: black; }
        .top3 { background: #cd7f32; color: black; }
        .status {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .online { background: #0f3460; color: #4CAF50; }
        .offline { background: #0f3460; color: #f44336; }
        .empty { color: #666; padding: 30px; }
        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 5px;
            font-size: 16px;
        }
        .add-form {
            background: #0f3460;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 BRAWL STARS</h1>
    <h3>Таблица лидеров</h3>

    <div id="status" class="status online">✅ Готов к работе</div>

    <!-- ФОРМА ДОБАВЛЕНИЯ -->
    <div class="add-form">
        <input type="text" id="playerName" placeholder="Имя игрока">
        <input type="number" id="playerTrophies" placeholder="Кубки" value="0">
        <button onclick="addPlayer()">➕ Добавить</button>
    </div>

    <button onclick="showData()">📊 Показать топ</button>
    <button onclick="clearAll()">🗑️ Очистить всё</button>

    <div id="list">
        <div class="empty">👾 Добавь первого игрока!</div>
    </div>

    <div id="count" style="margin-top:15px;color:#888;">0 игроков</div>
</div>

<script>
    // ============================================
    // JSON СОЗДАЁТСЯ ПРЯМО ЗДЕСЬ!
    // ============================================

    // Наш JSON с игроками (изначально пустой)
    let playersData = {
        players: []
    };

    // ============================================
    // ДОБАВЛЕНИЕ ИГРОКА
    // ============================================
    function addPlayer() {
        const name = document.getElementById('playerName').value.trim();
        const trophies = parseInt(document.getElementById('playerTrophies').value) || 0;

        if (!name) {
            alert('Введите имя!');
            return;
        }

        // Добавляем игрока в JSON
        playersData.players.push({
            id: 'p' + Date.now(),
            name: name,
            trophies: trophies
        });

        // Очищаем поля
        document.getElementById('playerName').value = '';
        document.getElementById('playerTrophies').value = '0';

        // Показываем обновлённый список
        showData();

        // Выводим JSON в консоль (для проверки)
        console.log('Текущий JSON:', JSON.stringify(playersData, null, 2));
    }

    // ============================================
    // ПОКАЗАТЬ ТОП
    // ============================================
    function showData() {
        const list = document.getElementById('list');
        const players = playersData.players;

        if (players.length === 0) {
            list.innerHTML = '<div class="empty">👾 Нет игроков</div>';
            document.getElementById('count').textContent = '0 игроков';
            return;
        }

        // Сортируем по кубкам
        players.sort((a, b) => b.trophies - a.trophies);

        let html = '';
        const top10 = players.slice(0, 10);

        top10.forEach((p, i) => {
            let cls = '';
            let medal = '#' + (i + 1);
            if (i === 0) { cls = 'top1'; medal = '🥇'; }
            else if (i === 1) { cls = 'top2'; medal = '🥈'; }
            else if (i === 2) { cls = 'top3'; medal = '🥉'; }

            html += `
                <div class="player ${cls}">
                    <span>${medal} ${p.name}</span>
                    <span>🏆 ${p.trophies}</span>
                </div>
            `;
        });

        list.innerHTML = html;
        document.getElementById('count').textContent = players.length + ' игроков';
    }

    // ============================================
    // ОЧИСТИТЬ ВСЁ
    // ============================================
    function clearAll() {
        if (!confirm('Удалить всех игроков?')) return;
        playersData.players = [];
        showData();
        console.log('JSON очищен:', JSON.stringify(playersData, null, 2));
    }

    // ============================================
    // ПОКАЗАТЬ JSON В КОНСОЛИ (для проверки)
    // ============================================
    console.log('JSON создан!');
    console.log('Текущий JSON:', JSON.stringify(playersData, null, 2));

    // Показываем начальный список
    showData();
</script>
</body>
</html>
